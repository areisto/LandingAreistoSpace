server {
    listen 80;
    server_name _;

    # تم التأكد من المسار بناءً على صورة الـ find التي أرسلتها
    root /var/www/html/public;
    index index.php index.html;

    # تحسين الأداء
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # التعامل مع الروابط (Laravel Routing)
    location / {
        # تم إضافة $is_args$args لضمان انتقال بيانات الـ Login بشكل سليم
        try_files $uri $uri/ /index.php$is_args$args;
    }

    # معالجة ملفات PHP
    location ~ \.php$ {
        fastcgi_pass aristo_dashboard_app:9000;
        fastcgi_index index.php;

        # يجب وضع include قبل الـ params المخصصة لضمان عدم تجاوزها
        include fastcgi_params;

        # إعدادات المسارات
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        # --- إجبار التوافق مع SSL الخاص بالخادم الرئيسي ---
        fastcgi_param HTTPS on;
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
        fastcgi_param HTTP_X_FORWARDED_FOR $http_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_HOST $http_x_forwarded_host;

        fastcgi_read_timeout 300;
    }

    # ملفات التخزين (Storage)
    location /storage/ {
        alias /var/www/html/storage/app/public/;
        try_files $uri $uri/ =404;
    }

    # ملفات Vite / Build
    location /build/ {
        add_header Access-Control-Allow-Origin *;
        try_files $uri $uri/ =404;
    }

    # حماية الملفات المخفية
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
